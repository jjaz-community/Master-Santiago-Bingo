<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER SANTIAGO BINGO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="bingo.jpg" id="bg-image" alt="background">

    <div class="container">
        <header>
            <h1 class="main-title">MASTER SANTIAGO</h1>
            <p class="watch-party-text">WATCH PARTY WITH JJAZ</p>
            
            <div class="user-box">
                <input type="text" id="username" placeholder="TWITCH/YOUTUBE NAME">
                <input type="text" id="map-code-input" placeholder="ใส่รหัสแมพ">
                <button class="btn-generate" onclick="generateNewBoard()">Generate Bingo</button>
            </div>

            <div id="board-info-display" class="map-label">
                PLAYER: <span id="display-name">-</span> | 
                MAP: <span id="display-map-code">READY</span>
            </div>
            
            <div class="bingo-header">
                <div>B</div>
                <div>I</div>
                <div class="special-letter">N</div>
                <div>G</div>
                <div>O</div>
            </div>
        </header>

        <div id="bingo-board" class="bingo-grid"></div>
    </div>

    <div id="win-overlay" class="win-overlay">
        <div class="win-content">
            <video id="win-video" width="100%" height="auto" playsinline>
                <source src="jjaz-victory.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <h1 class="win-title">BINGO!</h1>
            <p id="win-details"></p>
            <button class="btn-close" onclick="closeWin()">CLOSE</button>
        </div>
    </div>

    <footer>
    </footer>

    <script src="script.js"></script>
</body>
</html>
